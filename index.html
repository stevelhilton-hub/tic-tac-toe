<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      letter-spacing: 0.1em;
      color: #e2e8f0;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.5em;
      color: #a0aec0;
    }

    #status.winner-x  { color: #63b3ed; }
    #status.winner-o  { color: #fc8181; }
    #status.draw      { color: #fbd38d; }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.04);
    }

    .cell.taken {
      cursor: default;
    }

    .cell.x { color: #63b3ed; }
    .cell.o { color: #fc8181; }

    .cell.winning {
      background: #2d3748;
      animation: pulse 0.6s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    #reset {
      margin-top: 2rem;
      padding: 0.6rem 2rem;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      background: #4a5568;
      color: #eee;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.15s;
    }

    #reset:hover { background: #718096; }

    #scoreboard {
      display: flex;
      gap: 2.5rem;
      margin-bottom: 1.5rem;
      font-size: 1rem;
    }

    .score-item {
      text-align: center;
    }

    .score-item .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #718096;
    }

    .score-item .value {
      font-size: 1.6rem;
      font-weight: bold;
    }

    .score-item.x-score .value { color: #63b3ed; }
    .score-item.o-score .value { color: #fc8181; }
    .score-item.draw-score .value { color: #fbd38d; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>

  <div id="scoreboard">
    <div class="score-item x-score">
      <div class="label">X Wins</div>
      <div class="value" id="score-x">0</div>
    </div>
    <div class="score-item draw-score">
      <div class="label">Draws</div>
      <div class="value" id="score-draw">0</div>
    </div>
    <div class="score-item o-score">
      <div class="label">O Wins</div>
      <div class="value" id="score-o">0</div>
    </div>
  </div>

  <div id="status">X's turn</div>

  <div id="board">
    <div class="cell" data-index="0"></div>
    <div class="cell" data-index="1"></div>
    <div class="cell" data-index="2"></div>
    <div class="cell" data-index="3"></div>
    <div class="cell" data-index="4"></div>
    <div class="cell" data-index="5"></div>
    <div class="cell" data-index="6"></div>
    <div class="cell" data-index="7"></div>
    <div class="cell" data-index="8"></div>
  </div>

  <button id="reset">New Game</button>

  <script>
    const WINNING_LINES = [
      [0, 1, 2], [3, 4, 5], [6, 7, 8], // rows
      [0, 3, 6], [1, 4, 7], [2, 5, 8], // columns
      [0, 4, 8], [2, 4, 6],             // diagonals
    ];

    let board = Array(9).fill(null);
    let currentPlayer = 'X';
    let gameOver = false;
    const scores = { X: 0, O: 0, draw: 0 };

    const cells = document.querySelectorAll('.cell');
    const statusEl = document.getElementById('status');
    const resetBtn = document.getElementById('reset');
    const scoreX = document.getElementById('score-x');
    const scoreO = document.getElementById('score-o');
    const scoreDraw = document.getElementById('score-draw');

    cells.forEach(cell => cell.addEventListener('click', handleClick));
    resetBtn.addEventListener('click', resetGame);

    function handleClick(e) {
      const idx = parseInt(e.target.dataset.index);
      if (gameOver || board[idx]) return;

      board[idx] = currentPlayer;
      e.target.textContent = currentPlayer;
      e.target.classList.add('taken', currentPlayer.toLowerCase());

      const winLine = getWinningLine();
      if (winLine) {
        winLine.forEach(i => cells[i].classList.add('winning'));
        statusEl.textContent = `${currentPlayer} wins!`;
        statusEl.className = `winner-${currentPlayer.toLowerCase()}`;
        scores[currentPlayer]++;
        updateScoreboard();
        gameOver = true;
        return;
      }

      if (board.every(Boolean)) {
        statusEl.textContent = "It's a draw!";
        statusEl.className = 'draw';
        scores.draw++;
        updateScoreboard();
        gameOver = true;
        return;
      }

      currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
      statusEl.textContent = `${currentPlayer}'s turn`;
      statusEl.className = '';
    }

    function getWinningLine() {
      return WINNING_LINES.find(([a, b, c]) =>
        board[a] && board[a] === board[b] && board[a] === board[c]
      ) || null;
    }

    function updateScoreboard() {
      scoreX.textContent = scores.X;
      scoreO.textContent = scores.O;
      scoreDraw.textContent = scores.draw;
    }

    function resetGame() {
      board = Array(9).fill(null);
      currentPlayer = 'X';
      gameOver = false;
      statusEl.textContent = "X's turn";
      statusEl.className = '';
      cells.forEach(cell => {
        cell.textContent = '';
        cell.className = 'cell';
      });
    }
  </script>
</body>
</html>
